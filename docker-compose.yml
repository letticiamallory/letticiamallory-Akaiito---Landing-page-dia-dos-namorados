services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: linkamor
      POSTGRES_PASSWORD: linkamor
      POSTGRES_DB: linkamor
    ports:
      - "5433:5432"
    volumes:
      - linkamor_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U linkamor -d linkamor"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  linkamor_pg:
